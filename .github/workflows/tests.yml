name: tests

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python unittest suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # Backend is stdlib-only, so there is nothing to pip install.
      - name: Run tests
        run: python -m unittest discover -s tools/tests -t tools/tests -v

  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
