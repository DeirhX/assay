name: tests

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege: these jobs only read the repo. No token write scope.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Split from the old combined "Python lint + unittest suite" job so a red
  # check names its own cause: lint/type failures land here, test failures in
  # the sibling "Python tests" job. (The old name made every test break look
  # like a lint break.) Both are required by the "Protect main" ruleset.
  python-lint:
    name: Python lint (ruff + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # Backend is stdlib-only; ruff is the only dev-time install. Pin the
      # version so lint stays deterministic (rules are pinned in ruff.toml).
      - name: Lint (ruff)
        run: |
          pip install --quiet ruff==0.15.17
          ruff check --output-format=github tools
      # Pin mypy: type-check behaviour shifts between releases, so an unpinned
      # bump could red-wall a PR that never touched the offending code. Config
      # lives in mypy.ini (lenient baseline; tighten incrementally).
      - name: Type-check (mypy)
        run: |
          pip install --quiet mypy==2.1.0
          mypy tools

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # Production is stdlib-only; pytest is a pinned test-runner dependency.
      - name: Install test dependencies
        run: pip install --quiet -r tools/requirements-test.txt
      - name: Run tests
        run: python -m pytest tools/tests -q

  frontend:
    name: Frontend typecheck + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: Playwright e2e (hermetic)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # The suite intercepts /api/** — no Python server, secrets, or private
      # data submodule needed (see playwright.config.ts).
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run e2e
        run: npm run e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
