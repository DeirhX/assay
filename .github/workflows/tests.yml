name: tests

on:
  pull_request:
  push:
    branches: [main]

# Least-privilege: these jobs only read the repo. No token write scope.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint + unittest suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # Backend is stdlib-only; ruff is the only dev-time install. Pin the
      # version so lint stays deterministic (rules are pinned in ruff.toml).
      - name: Lint (ruff)
        run: |
          pip install --quiet ruff==0.15.17
          ruff check --output-format=github tools
      - name: Run tests
        run: python -m unittest discover -s tools/tests -t tools/tests -v

  frontend:
    name: Frontend typecheck + tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: Playwright e2e (hermetic)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # The suite intercepts /api/** — no Python server, secrets, or private
      # data submodule needed (see playwright.config.ts).
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run e2e
        run: npm run e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
          if-no-files-found: ignore
