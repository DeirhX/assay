[mypy]
# Gating type-check for the stdlib-only backend. CI (.github/workflows/
# tests.yml, Python job) runs `mypy tools` on every PR and blocks merge on new
# errors; `npm run typecheck:py` is the identical local command. The baseline
# below is deliberately lenient -- a green run means "no errors under these
# settings", not "type-safe". Tighten incrementally: drop ignore_missing_imports,
# then flip disallow_untyped_defs per-module, then enable stricter Any checks.
python_version = 3.13

# tools/ modules import each other flat (`import store`, `import ticker_analysis`)
# rather than as a package, so resolve them as top-level modules.
mypy_path = tools
explicit_package_bases = True
namespace_packages = True

# Lenient baseline.
ignore_missing_imports = True
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_unused_configs = True
# Zero-cost, zero-noise strictness (measured: 0 new errors on this tree):
#   strict_equality catches comparisons between non-overlapping types (a guard
#     that's silently always-False); extra_checks bundles related safety checks.
# Deliberately NOT enabled: warn_unreachable (flags this codebase's defensive
#   isinstance guards at JSON boundaries as "unreachable" -- false positives),
#   disallow_any_generics (300+ hits on bare dict/list, churn without much value).
strict_equality = True
extra_checks = True

# Tests lean on fixtures/monkeypatching and aren't the value here yet.
[mypy-tests.*]
ignore_errors = True

# Money-critical core: require every function to be fully annotated so `Any`
# from JSON can't flow *into* the code that sizes orders and allocates capital
# unnoticed. Kept per-module (not tree-wide) on purpose -- the whole-tree flip
# is 178 errors of low-value churn; these modules are where a type bug moves
# real money. Extend this list as other modules reach a clean annotated state.
[mypy-rebalance]
disallow_untyped_defs = True
[mypy-portfolio]
disallow_untyped_defs = True
[mypy-optimizer]
disallow_untyped_defs = True
[mypy-risk]
disallow_untyped_defs = True
[mypy-target_model]
disallow_untyped_defs = True
[mypy-price_levels]
disallow_untyped_defs = True
[mypy-ibkr_trade]
disallow_untyped_defs = True
[mypy-trade_service]
disallow_untyped_defs = True
