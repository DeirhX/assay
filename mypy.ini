[mypy]
# Non-gating type-check for the stdlib-only backend. CI (.github/workflows/
# tests.yml) does NOT run this yet -- it's a local signal command
# (`npm run typecheck:py`) so we can chip away at real type errors without
# turning the whole suite red overnight. Tighten incrementally: drop
# ignore_missing_imports, then flip disallow_untyped_defs per-module, then gate.
python_version = 3.13

# tools/ modules import each other flat (`import store`, `import ticker_analysis`)
# rather than as a package, so resolve them as top-level modules.
mypy_path = tools
explicit_package_bases = True
namespace_packages = True

# Lenient baseline.
ignore_missing_imports = True
check_untyped_defs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_unused_configs = True

# Tests lean on fixtures/monkeypatching and aren't the value here yet.
[mypy-tests.*]
ignore_errors = True
