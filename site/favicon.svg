<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Assay">
  <defs>
    <linearGradient id="aBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2233"/>
      <stop offset="1" stop-color="#10131a"/>
    </linearGradient>
    <linearGradient id="aBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b3ccff"/>
      <stop offset="1" stop-color="#6f9bff"/>
    </linearGradient>
    <linearGradient id="aGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd993"/>
      <stop offset="1" stop-color="#e0a23a"/>
    </linearGradient>
  </defs>

  <rect x="1.25" y="1.25" width="61.5" height="61.5" rx="15" fill="url(#aBg)" stroke="#2c3446" stroke-width="1.5"/>

  <!-- post + base -->
  <g fill="none" stroke="url(#aBlue)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 14v34" stroke-width="4"/>
    <path d="M22 50h20" stroke-width="4"/>
    <!-- tilted beam: the laden pan dips -->
    <path d="M14 13.5 50 21.5" stroke-width="4"/>
    <!-- vertical pan hangers -->
    <path d="M14 13.5V22" stroke-width="2.4"/>
    <path d="M50 21.5V30" stroke-width="2.4"/>
  </g>

  <!-- pans hanging level under gravity, at different heights -->
  <g stroke="#bcc5d4" stroke-width="2.3" stroke-linejoin="round" fill="rgba(130,170,255,.13)">
    <path d="M7.5 22a6.5 5 0 0 0 13 0Z"/>
    <path d="M43.5 30a6.5 5 0 0 0 13 0Z"/>
  </g>

  <!-- gold pivot + the gold bar being weighed -->
  <circle cx="32" cy="17.5" r="3.7" fill="url(#aGold)"/>
  <rect x="45.5" y="31.6" width="9" height="3.8" rx="1.1" fill="url(#aGold)"/>
</svg>
