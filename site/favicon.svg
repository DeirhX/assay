<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Assay">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5c76b"/>
      <stop offset="1" stop-color="#e0a23a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#14171e"/>
  <!-- assay balance beam -->
  <path d="M32 12v34" stroke="#82aaff" stroke-width="3" stroke-linecap="round"/>
  <path d="M14 20h36" stroke="#82aaff" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="12" r="3.4" fill="#82aaff"/>
  <!-- left pan -->
  <path d="M9 20l-4 9a9 9 0 0 0 18 0l-4-9" fill="none" stroke="#a8b0bf" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- right pan holds the gold ingot being assayed -->
  <path d="M43 20l-4 9a9 9 0 0 0 18 0l-4-9" fill="none" stroke="#a8b0bf" stroke-width="2.4" stroke-linejoin="round"/>
  <rect x="44" y="24.5" width="12" height="5.5" rx="1.4" fill="url(#g)"/>
  <!-- base -->
  <path d="M22 50h20" stroke="#82aaff" stroke-width="3" stroke-linecap="round"/>
</svg>
